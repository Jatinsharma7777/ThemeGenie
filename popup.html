<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ThemeGenie</title>
    <link rel="stylesheet" href="popup.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="brand">THEMEGENIE</div>
            <div id="domain-display">---</div>
        </header>

        <div class="mode-selector">
            <button class="mode-btn active" id="btn-site">Local</button>
            <button class="mode-btn" id="btn-global">Global</button>
        </div>

        <main>
            <div class="ai-section">
                <input type="text" id="ai-prompt" placeholder="Describe theme (e.g. 'Dark Neon Blue')...">
                <button id="ai-magic-btn" title="Generate with AI">✨</button>
            </div>
            <textarea id="css-editor" spellcheck="false" placeholder="/* CSS */"></textarea>
            
            <div id="preview-actions" class="hidden">
                <span>Keep this theme?</span>
                <div class="preview-btns">
                    <button id="keep-yes">YES</button>
                    <button id="keep-no">NO</button>
                </div>
            </div>

            <div id="ai-status" class="hidden">Analyzing page...</div>
        </main>

        <footer>
            <div class="sys-links">
                <span id="open-dashboard">Dashboard</span>
                <span id="download-css">Download .css</span>
                <span id="clear-all">Clear</span>
            </div>
            <button id="save-btn">APPLY</button>
        </footer>
    </div>
    <script type="module" src="popup.js"></script>
</body>
</html>
